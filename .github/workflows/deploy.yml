name: Deploy Wiki
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install mkdocs-material mkdocs-minify-plugin mkdocs-git-revision-date-localized-plugin ruamel.yaml
      - run: python generate_stats.py
        working-directory: wiki
      - run: python ci_inject_plugins.py
        working-directory: wiki
      - run: mkdocs build
        working-directory: wiki
      - uses: actions/upload-pages-artifact@v3
        with:
          path: wiki/site
      - uses: actions/deploy-pages@v4
        id: deployment
